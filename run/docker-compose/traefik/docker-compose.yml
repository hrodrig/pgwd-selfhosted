# Production-oriented stack: Traefik (TLS + HTTP→HTTPS) + pgwd (no host ports on the app).
#
# Prerequisites:
#   - DNS A/AAAA for PGWD_HOSTNAME → this host's public IP
#   - Ports 80 and 443 reachable from the internet (80 for redirect + ACME HTTP-01)
#
# Usage (from repository root):
#   export PGWD_HOST_DATA=/path/on/host
#   mkdir -p "$PGWD_HOST_DATA"
#   cp run/common/.env.example "${PGWD_HOST_DATA}/.env"   # edit; set PGWD_HOST_DATA inside the file
#   docker compose --env-file "${PGWD_HOST_DATA}/.env" -f run/docker-compose/traefik/docker-compose.yml up -d
#
# Local dev without Traefik: use run/docker-compose/minimal/docker-compose.yml instead.
#
# Bind mount: set PGWD_HOST_DATA to an absolute host path (recommended). PGWD_UID/PGWD_GID must own that directory (see id -u / id -g).
#
# Traefik needs a recent image for Docker Engine 28+ / 29+ (minimum API 1.40+); see traefik:v3.6.1+.
# Prometheus metrics: run/docker-compose/observability/observability/prometheus.yml scrapes http://traefik:8080/metrics (same Docker network).
#
# Log rotation (json-file driver): caps disk use per container; tune max-size/max-file if access logs are heavy.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

networks:
  edge:
    name: pgwd_edge
    driver: bridge

volumes:
  traefik_letsencrypt:

services:
  traefik:
    image: traefik:v3.6.12
    restart: always
    security_opt:
      - no-new-privileges:true
    command:
      - --log.level=INFO
      # Opt-in: anonymous usage stats (version, hashed static config). Disable with false if you prefer no telemetry.
      - --global.sendAnonymousUsage=true
      - --accesslog=true
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=pgwd_edge
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Prometheus metrics at http://traefik:8080/metrics (internal only; not published on the host).
      - --metrics.prometheus=true
      - --metrics.prometheus.addEntryPointsLabels=true
      - --metrics.prometheus.addServicesLabels=true
      - --entrypoints.traefik.address=:8080
      # Redirect all HTTP to HTTPS (ACME HTTP-01 paths are handled before redirect).
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:?set ACME_EMAIL for Let's Encrypt}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - edge
    logging: *default-logging

  pgwd:
    image: ghcr.io/hrodrig/pgwd:${PGWD_VERSION:-v0.5.10}
    restart: always
    user: "${PGWD_UID:?set PGWD_UID in .env to id -u}:${PGWD_GID:?set PGWD_GID in .env to id -g}"
    security_opt:
      - no-new-privileges:true
    environment:
      PGWD_DB_URL: ${PGWD_DB_URL:?set PGWD_DB_URL}
      PGWD_CLIENT: ${PGWD_CLIENT:-pgwd-traefik}
      PGWD_INTERVAL: ${PGWD_INTERVAL:-60}
      PGWD_LOG_LEVEL: ${PGWD_LOG_LEVEL:-info}
      # Must set notifiers and/or PGWD_DRY_RUN=true or pgwd exits (restart loop). Default false — configure webhooks or set true in .env.
      PGWD_DRY_RUN: ${PGWD_DRY_RUN:-false}
      PGWD_HTTP_LISTEN: "0.0.0.0:8080"
      PGWD_SQLITE_PATH: /var/lib/pgwd/pgwd.db
      PGWD_NOTIFICATIONS_SLACK_WEBHOOK: ${PGWD_NOTIFICATIONS_SLACK_WEBHOOK:-}
      PGWD_NOTIFICATIONS_LOKI_URL: ${PGWD_NOTIFICATIONS_LOKI_URL:-}
    volumes:
      - ${PGWD_HOST_DATA:-../../../data}:/var/lib/pgwd
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=pgwd_edge
      # Rate limit per client IP (token bucket); reduces noisy scanners before they hit the app.
      - traefik.http.middlewares.pgwd-ratelimit.ratelimit.average=10
      - traefik.http.middlewares.pgwd-ratelimit.ratelimit.period=1s
      - traefik.http.middlewares.pgwd-ratelimit.ratelimit.burst=50
      - traefik.http.middlewares.pgwd-hdr.headers.frameDeny=true
      - traefik.http.middlewares.pgwd-hdr.headers.browserXssFilter=true
      - traefik.http.middlewares.pgwd-hdr.headers.contentTypeNosniff=true
      - traefik.http.middlewares.pgwd-hdr.headers.stsSeconds=31536000
      - traefik.http.middlewares.pgwd-hdr.headers.stsIncludeSubdomains=false
      - traefik.http.routers.pgwd.rule=Host(`${PGWD_HOSTNAME:?set PGWD_HOSTNAME FQDN}`)
      - traefik.http.routers.pgwd.entrypoints=websecure
      - traefik.http.routers.pgwd.tls=true
      - traefik.http.routers.pgwd.tls.certresolver=le
      - traefik.http.routers.pgwd.middlewares=pgwd-ratelimit,pgwd-hdr
      - traefik.http.services.pgwd.loadbalancer.server.port=8080
    logging: *default-logging
