apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pgwd.fullname" . }}
  labels:
    {{- include "pgwd.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pgwd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pgwd.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "pgwd.fullname" . }}
      {{- else if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "pgwd.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            {{- if .Values.config.enabled }}
            - name: PGWD_CONFIG
              value: /etc/pgwd/pgwd.conf
            {{- else }}
            {{- if or .Values.secrets.existingSecret (and .Values.secrets.create (not .Values.secrets.existingSecret) (or .Values.secrets.dbUrl .Values.secrets.slackWebhook .Values.secrets.lokiUrl)) }}
            {{- $secretName := .Values.secrets.existingSecret | default (printf "%s-secrets" (include "pgwd.fullname" .)) }}
            {{- if or .Values.secrets.dbUrl .Values.secrets.existingSecret }}
            - name: PGWD_DB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: url
            {{- end }}
            {{- if or .Values.secrets.slackWebhook .Values.secrets.existingSecret }}
            - name: PGWD_NOTIFICATIONS_SLACK_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: slack-webhook
            {{- end }}
            {{- if or .Values.secrets.lokiUrl .Values.secrets.existingSecret }}
            - name: PGWD_NOTIFICATIONS_LOKI_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: loki-url
            {{- end }}
            {{- end }}
            {{- end }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              {{- if and (kindIs "map" $val) (hasKey $val "secretKeyRef") }}
              valueFrom:
                secretKeyRef:
                  name: {{ $val.secretKeyRef.name }}
                  key: {{ $val.secretKeyRef.key }}
              {{- else }}
              value: {{ $val | quote }}
              {{- end }}
            {{- end }}
            {{- if and .Values.http.enabled (not .Values.config.enabled) }}
            - name: PGWD_HTTP_LISTEN
              value: {{ .Values.http.listen | quote }}
            {{- end }}
            {{- if and .Values.persistence.enabled (not .Values.config.enabled) }}
            - name: PGWD_SQLITE_PATH
              value: {{ printf "%s/%s" .Values.persistence.mountPath .Values.persistence.sqliteFile | quote }}
            {{- end }}
          {{- if .Values.http.enabled }}
          ports:
            - name: http
              containerPort: {{ .Values.http.containerPort }}
              protocol: TCP
          {{- if .Values.http.probes.enabled }}
          livenessProbe:
            httpGet:
              path: {{ include "pgwd.healthPath" . | quote }}
              port: http
            initialDelaySeconds: {{ .Values.http.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.http.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.http.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.http.probes.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ include "pgwd.healthPath" . | quote }}
              port: http
            initialDelaySeconds: {{ .Values.http.probes.readinessInitialDelaySeconds }}
            periodSeconds: {{ .Values.http.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.http.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.http.probes.failureThreshold }}
          {{- end }}
          {{- end }}
          {{- if or .Values.config.enabled .Values.persistence.enabled }}
          volumeMounts:
            {{- if .Values.config.enabled }}
            - name: config
              mountPath: /etc/pgwd
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath | quote }}
              {{- if .Values.persistence.subPath }}
              subPath: {{ .Values.persistence.subPath | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if or .Values.config.enabled .Values.persistence.enabled }}
      volumes:
        {{- if .Values.config.enabled }}
        - name: config
          configMap:
            name: {{ include "pgwd.fullname" . }}-config
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "pgwd.fullname" . }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
