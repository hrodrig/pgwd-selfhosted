# Example values for config-file mode (pgwd YAML in config.extra).
# Schema: hrodrig/pgwd internal/config/file.go and contrib/pgwd.conf.example.
# Do not use log_level / confirm_* here — they are not file fields (silently ignored by the parser).
config:
  enabled: true
  extra: |
    client: pgwd-k8s
    interval: 60
    dry_run: true
    notify_on_connect_failure: true
    db:
      url: postgres://user:password@postgres.default.svc.cluster.local:5432/mydb?sslmode=disable
      threshold:
        levels: "75,85,95"
    notifications:
      slack:
        webhook: "https://hooks.slack.com/services/..."
      loki:
        url: "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"

# Chart-created Secret is optional when DB + notifiers live entirely in config.extra.
# Prefer Sealed Secrets / External Secrets for real webhooks and DB URLs in gitops.
secrets:
  create: false
