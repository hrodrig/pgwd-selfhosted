# Example values for config-file mode (multiple databases)
config:
  enabled: true
  extra: |
    client: pgwd-k8s
    interval: 60
    dry_run: false
    log_level: info
    notify_on_connect_failure: true
    databases:
      - url: postgres://user:password@postgres.default.svc.cluster.local:5432/mydb
        threshold:
          levels: "75,85,95"
      - url: postgres://user:password@replica.default.svc.cluster.local:5432/mydb
        threshold:
          levels: "75,85,95"
    sqlite:
      path: /var/lib/pgwd/pgwd.db
      max_metrics: 10000
    http:
      listen: ":8080"
      base_path: "/api/pgwd/v1"
      healthz_path: "/healthz"
      metrics_path: "/metrics"
    confirm_alert: 2
    confirm_ok: 2
    notifications:
      slack:
        webhook: "https://hooks.slack.com/services/..."
      loki:
        url: "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"

# No secrets needed for DB URL when using config (URLs are in config)
# Create secret for slack/loki if you want to inject via tpl - or put in config.extra
secrets:
  create: false
