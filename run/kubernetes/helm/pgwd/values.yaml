# Default values for pgwd.
# In-cluster deployment: use direct service URLs (no kubectl, no port-forward).

replicaCount: 1

image:
  repository: ghcr.io/hrodrig/pgwd
  tag: ""  # defaults to Chart appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ServiceAccount: optional; not needed for in-cluster direct URLs
serviceAccount:
  create: false
  name: ""

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Resources
resources:
  requests:
    memory: "32Mi"
    cpu: "10m"
  limits:
    memory: "64Mi"
    cpu: "100m"

# Node selector / tolerations / affinity
nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------------------------
# pgwd configuration
# -----------------------------------------------------------------------------
# Two modes:
# 1. Config file (recommended for multiple databases): set config.enabled=true
#    and configure config.databases. Template values for URLs from secrets.
# 2. Env vars: set config.enabled=false and use env.* below.
#
config:
  enabled: false
  # When enabled, full config YAML. Use tpl for values from secrets.
  # Example for single DB with secret:
  # databases:
  #   - url: postgres://user:{{ .Values.secrets.dbPassword }}@postgres.default.svc.cluster.local:5432/mydb
  #     threshold:
  #       levels: "75,85,95"
  #   - url: postgres://user:{{ .Values.secrets.dbPassword }}@replica.default.svc.cluster.local:5432/mydb
  extra: |
    client: "pgwd-k8s"
    interval: 60
    dry_run: false
    log_level: info
    notify_on_connect_failure: true
    sqlite:
      path: /var/lib/pgwd/pgwd.db
      max_metrics: 10000
    http:
      listen: ":8080"
      base_path: "/api/pgwd/v1"
      healthz_path: "/healthz"
      metrics_path: "/metrics"
    confirm_alert: 2
    confirm_ok: 2
    notifications:
      slack:
        webhook: ""
      loki:
        url: ""

# Environment variables (used when config.enabled=false)
# When config.enabled=true, env vars are IGNORED by pgwd; configure via config.extra instead.
env:
  PGWD_CLIENT: "pgwd-k8s"
  PGWD_INTERVAL: "60"
  PGWD_LOG_LEVEL: "info"
  PGWD_HTTP_LISTEN: ":8080"
  PGWD_SQLITE_PATH: "/var/lib/pgwd/pgwd.db"
  # PGWD_NOTIFICATIONS_SLACK_WEBHOOK: from secrets
  # PGWD_NOTIFICATIONS_LOKI_URL: from secrets

# Secrets: create a Secret from these values (stringData, not base64)
# Or use existingSecret to reference an existing Secret.
secrets:
  create: true
  dbUrl: ""       # e.g. postgres://user:pass@postgres.default.svc.cluster.local:5432/mydb?sslmode=disable
  slackWebhook: "" # Slack incoming webhook URL
  lokiUrl: ""     # e.g. http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  # Use existingSecret to reference an existing secret (keys: url, slack-webhook, loki-url)
  # When set, we use this instead of creating; no secret is created.
  existingSecret: ""

# Persistence for SQLite store (resolution notifications, /metrics history)
persistence:
  enabled: true
  storageClass: ""  # use cluster default
  size: 1Gi
  # existingClaim: ""  # use existing PVC instead of creating

# HTTP service (for metrics scraping, optional)
service:
  enabled: true
  type: ClusterIP
  port: 8080

# Liveness / readiness probes
livenessProbe:
  httpGet:
    path: /api/pgwd/v1/healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/pgwd/v1/healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

# Optional: PodMonitor for Prometheus Operator
podMonitor:
  enabled: false
  interval: 30s
  path: /api/pgwd/v1/metrics
