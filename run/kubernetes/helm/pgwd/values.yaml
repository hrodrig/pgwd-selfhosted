# Default values for pgwd.
# In-cluster deployment: use direct service URLs (no kubectl, no port-forward).

replicaCount: 1

image:
  repository: ghcr.io/hrodrig/pgwd
  tag: "v0.6.4"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ServiceAccount: optional; not needed for in-cluster direct URLs
serviceAccount:
  create: false
  name: ""

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Resources
resources:
  requests:
    memory: "32Mi"
    cpu: "10m"
  limits:
    memory: "64Mi"
    cpu: "100m"

# Node selector / tolerations / affinity
nodeSelector: {}
tolerations: []
affinity: {}

# -----------------------------------------------------------------------------
# pgwd configuration
# -----------------------------------------------------------------------------
# Two modes:
# 1. Config file: set config.enabled=true and full YAML in config.extra (db:, notifications:, …).
# 2. Env vars: set config.enabled=false and use env.* below.
#
config:
  enabled: false
  # When enabled, full config YAML in config.extra (ConfigMap content is written verbatim — this chart does not tpl it).
  # To take the DB URL from chart secrets, keep config.enabled=false and use secrets.dbUrl → PGWD_DB_URL on the Deployment.
  # Example db: fragment if you embed a static URL here (align with your pgwd image tag / file schema):
  # db:
  #   url: postgres://user:pass@postgres.default.svc.cluster.local:5432/mydb?sslmode=disable
  #   threshold:
  #     levels: "75,85,95"
  # Schema: pgwd file YAML (see hrodrig/pgwd internal/config/file.go and contrib/pgwd.conf.example).
  # Multi-database: if you use databases: with several URLs, do not combine with kube.postgres in the same
  # config; use direct in-cluster URLs. SQLite history keys (client, cluster, database) omit URL host — use
  # unique client per databases: entry when the same DB name is on different hosts. See pgwd README
  # https://github.com/hrodrig/pgwd/blob/main/README.md#multi-database-limitations
  # Supported YAML keys include log_level, confirm_alert, confirm_ok, sqlite, http (see upstream file.go). CSV export is CLI-only.
  # See hrodrig/pgwd internal/config/file.go and contrib/pgwd.conf.example.
  extra: |
    client: "pgwd-k8s"
    interval: 60
    dry_run: true
    notify_on_connect_failure: true
    db:
      url: postgres://user:pass@postgres.default.svc.cluster.local:5432/mydb?sslmode=disable
    notifications:
      slack:
        webhook: ""
      loki:
        url: ""

# Environment variables (used when config.enabled=false)
# When config.enabled=true, env vars are IGNORED by pgwd; configure via config.extra instead.
env:
  PGWD_CLIENT: "pgwd-k8s"
  PGWD_INTERVAL: "60"
  PGWD_LOG_LEVEL: "info"
  # Optional (pgwd 0.6+): writable path + listen address — add a volumeMount if you set SQLITE_PATH.
  # PGWD_SQLITE_PATH: "/var/lib/pgwd/metrics.db"
  # PGWD_HTTP_LISTEN: ":8080"
  # PGWD_CONFIRM_ALERT: "1"
  # PGWD_CONFIRM_OK: "1"
  # PGWD_NOTIFICATIONS_SLACK_WEBHOOK: from secrets
  # PGWD_NOTIFICATIONS_LOKI_URL: from secrets

# Secrets: create a Secret from these values (stringData, not base64)
# Or use existingSecret to reference an existing Secret.
secrets:
  create: true
  dbUrl: ""       # e.g. postgres://user:pass@postgres.default.svc.cluster.local:5432/mydb?sslmode=disable
  slackWebhook: "" # Slack incoming webhook URL
  lokiUrl: ""     # e.g. http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  # Use existingSecret to reference an existing secret (keys: url, slack-webhook, loki-url)
  # When set, we use this instead of creating; no secret is created.
  existingSecret: ""

# HTTP server (pgwd 0.6+): /healthz and Prometheus /metrics under base path. When config.enabled=true,
# set the same listen/paths in config.extra (http: block) — this chart does not inject PGWD_HTTP_* env in that mode.
http:
  enabled: true
  listen: ":8080"
  containerPort: 8080
  basePath: "/api/pgwd/v1"
  healthPath: "/healthz"
  metricsPath: "/metrics"
  # Full path for probes; empty = basePath + "/" + healthPath (must match pgwd config).
  probePath: ""
  probes:
    enabled: true
    initialDelaySeconds: 5
    readinessInitialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

# Service exposes containerPort when http.enabled. Add annotations for Prometheus Operator / scrape configs.
service:
  enabled: true
  type: ClusterIP
  port: 8080
  annotations: {}

# Persistent SQLite metrics store (ReadWriteOnce). Use replicaCount: 1 only. When config.enabled=true,
# set sqlite.path in config.extra to mountPath/sqliteFile (or your path under mountPath).
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /var/lib/pgwd
  sqliteFile: metrics.db
  subPath: ""
