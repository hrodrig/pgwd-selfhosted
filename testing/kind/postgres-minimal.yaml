# Minimal Postgres for local Helm smoke tests (kind / minikube).
# Matches the README quick-start URL:
#   postgres://user:password@postgres.default.svc.cluster.local:5432/mydb?sslmode=disable
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-minimal
  namespace: default
  labels:
    app.kubernetes.io/name: postgres-minimal
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-minimal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-minimal
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: user
            - name: POSTGRES_PASSWORD
              value: password
            - name: POSTGRES_DB
              value: mydb
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "user", "-d", "mydb"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: default
  labels:
    app.kubernetes.io/name: postgres-minimal
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: postgres-minimal
