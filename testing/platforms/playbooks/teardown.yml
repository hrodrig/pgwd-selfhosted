---
- name: pgwd-selfhosted compose teardown
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Minimal stack down
      ansible.builtin.command:
        argv:
          - ./run/scripts/compose-stack.sh
          - minimal
          - down
        chdir: "{{ pgwd_compose_repo_dest }}"
      environment:
        PGWD_HOST_DATA: "{{ pgwd_host_data }}"
        PATH: "{{ compose_docker_path_prefix }}:{{ (ansible_facts.env | default(ansible_facts.ansible_env | default({}))).PATH | default('/usr/bin:/bin') }}"
      register: compose_down
      changed_when: compose_down.rc == 0
      failed_when: false
