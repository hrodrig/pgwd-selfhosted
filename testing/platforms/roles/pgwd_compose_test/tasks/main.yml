---
- name: Verify Docker CLI is available
  ansible.builtin.command:
    argv:
      - docker
      - --version
  environment:
    PATH: "{{ compose_docker_path_prefix }}:{{ (ansible_facts.env | default(ansible_facts.ansible_env | default({}))).PATH | default('/usr/bin:/bin') }}"
  register: pgwd_compose_docker_check
  changed_when: false
  failed_when: false

- name: Prerequisite validation — Docker CLI
  ansible.builtin.fail:
    msg: >
      Prerequisite check failed: Docker CLI not available (docker --version failed).
      Install Docker Engine and the Compose v2 plugin on this host (same requirement as running
      compose-stack.sh manually). Ansible prepends {{ compose_docker_path_prefix }} to PATH for non-login SSH.
      See https://docs.docker.com/engine/install/
  when: pgwd_compose_docker_check.rc != 0

- name: Start minimal stack
  ansible.builtin.command:
    argv:
      - ./run/scripts/compose-stack.sh
      - minimal
      - up
      - -d
    chdir: "{{ pgwd_compose_repo_dest }}"
  environment:
    PGWD_HOST_DATA: "{{ pgwd_host_data }}"
    PATH: "{{ compose_docker_path_prefix }}:{{ (ansible_facts.env | default(ansible_facts.ansible_env | default({}))).PATH | default('/usr/bin:/bin') }}"
  register: compose_up
  changed_when: >
    'Creating' in (compose_up.stdout | default(''))
    or 'Started' in (compose_up.stdout | default(''))
    or 'Starting' in (compose_up.stdout | default(''))
    or 'Recreate' in (compose_up.stdout | default(''))
    or 'recreated' in (compose_up.stderr | default(''))

- name: Wait for pgwd Postgres stats in container logs
  ansible.builtin.shell: docker logs pgwd 2>&1 | tail -400
  register: pgwd_log_check
  until: pgwd_log_check.rc == 0 and ('total=' in pgwd_log_check.stdout) and ('active=' in pgwd_log_check.stdout)
  retries: 45
  delay: 2
  changed_when: false
